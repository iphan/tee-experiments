document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 .anim{ opacity:1; }\n  @media (prefers-reduced-motion: no-preference){\n    [data-deck-active] .anim{ animation: rise .5s cubic-bezier(.2,.7,.2,1) both; }\n    [data-deck-active] .anim:nth-child(2){ animation-delay:.04s; }\n    [data-deck-active] .d1{ animation-delay:.06s!important; }\n    [data-deck-active] .d2{ animation-delay:.12s!important; }\n    [data-deck-active] .d3{ animation-delay:.18s!important; }\n    [data-deck-active] .d4{ animation-delay:.24s!important; }\n    [data-deck-active] .d5{ animation-delay:.30s!important; }\n  }\n  @keyframes rise{ from{ transform:translateY(14px); } to{ transform:none; } }\n\n  /* ---------- title ---------- */\n  .title-wrap{ justify-content:center; }\n  .title-meta{\n    margin-top: calc(40px * var(--scale));\n    display:flex; flex-direction:column; gap:8px;\n    font-family:var(--mono); color:var(--ink-3); font-size: calc(24px * var(--scale));\n    letter-spacing:.01em;\n  }\n  .title-rule{ width: calc(120px * var(--scale)); height:3px; background:var(--accent); margin: calc(34px * var(--scale)) 0; }\n  .corner-tag{\n    position:absolute; top: calc(64px * var(--scale)); right: calc(120px * var(--scale));\n    font-family:var(--mono); font-size: calc(21px * var(--scale)); letter-spacing:.1em;\n    text-transform:uppercase; color:var(--ink-3);\n    border:1px solid var(--line); border-radius:100px; padding:9px 20px;\n    white-space:nowrap;\n  }\n\n  /* ---------- section divider ---------- */\n  .divider{ background:var(--ink); color:#fff; justify-content:center; }\n  .divider .eyebrow{ color: color-mix(in srgb, var(--accent) 60%, #fff); }\n  .divider .eyebrow::before{ background: color-mix(in srgb, var(--accent) 60%, #fff); }\n  .divider h2.head{ color:#fff; font-size: 68px; max-width:22ch; margin-top:24px;}\n  .divider .lead{ color: #b9c0cf; margin-top:26px; }\n  .divider .foot{ color:#5b6377; }\n\n  /* ---------- two column ---------- */\n  .cols{ display:grid; grid-template-columns: 1.05fr 1fr; gap: calc(72px * var(--scale)); flex:1; align-items:center; }\n  .cols.top{ align-items:start; }\n\n  .stack{ display:flex; flex-direction:column; gap: calc(22px * var(--scale)); }\n  .body{ font-size: calc(25px * var(--scale)); line-height:1.5; color:var(--ink-2); max-width:40ch; text-wrap:pretty; }\n\n  /* bullet list */\n  ul.clean{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap: calc(20px * var(--scale)); }\n  ul.clean li{\n    position:relative; padding-left: calc(34px * var(--scale));\n    font-size: calc(25px * var(--scale)); line-height:1.42; color:var(--ink-2);\n    text-wrap:pretty;\n  }\n  ul.clean li::before{\n    content:\"\"; position:absolute; left:0; top: calc(13px * var(--scale));\n    width:11px; height:11px; border-radius:3px; background:var(--accent);\n  }\n  ul.clean li b{ color:var(--ink); }\n\n  /* feature cards */\n  .cards{ display:grid; gap: calc(20px * var(--scale)); }\n  .card{\n    border:1px solid var(--line); border-radius:18px; padding: calc(30px * var(--scale)) calc(32px * var(--scale));\n    background:var(--paper); display:flex; flex-direction:column; gap:10px;\n  }\n  .card .ct{ font-weight:600; font-size: calc(24px * var(--scale)); letter-spacing:-.01em; display:flex; gap:14px; align-items:center;}\n  .card .cb{ font-size: calc(21px * var(--scale)); line-height:1.45; color:var(--ink-3); text-wrap:pretty; }\n  .chip{\n    font-family:var(--mono); font-size:calc(21px * var(--scale)); font-weight:600; color:var(--accent);\n    background:var(--accent-soft); border-radius:8px; padding:3px 10px; letter-spacing:.02em;\n  }\n\n  /* big stat */\n  .statbig{ font-family:var(--sans); font-weight:600; letter-spacing:-.03em; line-height:.9;\n    font-size: calc(150px * var(--scale)); color:var(--accent); }\n  .statlabel{ font-size:calc(24px*var(--scale)); color:var(--ink-2); line-height:1.4; max-width:24ch; }\n\n  .pill-row{ display:flex; gap:12px; flex-wrap:wrap; }\n  .pill{\n    font-family:var(--mono); font-size:calc(21px*var(--scale)); color:var(--ink-2);\n    border:1px solid var(--line); border-radius:100px; padding:8px 18px; background:var(--paper-2);\n  }\n\n  /* ====== helpers reused inside slides defined inline ====== */\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"font-size: 24px\">\n\n<deck-stage width=\"1920\" height=\"1080\" no-rail=\"\">\n\n  <!-- ============ 1 · TITLE ============ -->\n  <section data-label=\"Title\" data-screen-label=\"01\">\n    <div class=\"corner-tag anim\">BlueDot · Technical AI Safety Sprint<\u002Fdiv>\n    <div class=\"pad title-wrap\">\n      <div class=\"eyebrow anim\">Research replication &amp; extension<\u002Fdiv>\n      <div class=\"title-rule anim d1\"><\u002Fdiv>\n      <h1 class=\"title anim d1\">Measurement error<br>in LLM evals<\u002Fh1>\n      <div class=\"title-meta anim d2\">\n        <div>A replication &amp; extension of <span class=\"accent\">Total Eval Error<\u002Fspan> (Messing, 2026)<\u002Fdiv>\n        <div style=\"margin-top:18px;\">Isabelle Phan<\u002Fdiv>\n        <div>May – June 2026<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 2 · HOOK ============ -->\n  <section data-label=\"Every measurement has noise\" data-screen-label=\"02\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">The core idea<\u002Fdiv>\n      <div class=\"cols\" style=\"margin-top: calc(28px * var(--scale)); flex:1;\">\n        <div class=\"stack\" style=\"min-height:0;overflow:hidden;\">\n          <h2 class=\"head anim d1\">Every measurement<br>has noise<\u002Fh2>\n          <div class=\"body anim d2\" style=\"font-size: 36px; max-width: 44ch; text-wrap: pretty\">The real question is never “is there noise?”<br>It's how much, and where does it come from?<\u002Fdiv>\n          <div class=\"body anim d3\" style=\"font-size: calc(28px * var(--scale))\">Answer that, and you can do two things every serious field already does:<\u002Fdiv>\n          <ul class=\"clean\">\n            <li class=\"anim d4\" style=\"font-size: calc(28px * var(--scale))\">Report honestly → give a range, not a single number.<\u002Fli>\n            <li class=\"anim d5\" style=\"font-size: calc(28px * var(--scale))\">Spend wisely&nbsp;→ invest effort where it actually cuts the noise.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"anim d3\" id=\"hook-viz\" style=\"align-self:stretch;display:flex;align-items:center;justify-content:center;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"pill-row anim d5\" style=\"margin-top: calc(20px * var(--scale));\">\n        <span class=\"pill\">Manufacturing QA<\u002Fspan>\n        <span class=\"pill\">Clinical trials<\u002Fspan>\n        <span class=\"pill\">Survey research<\u002Fspan>\n        <span class=\"pill\">Lab metrology<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 3 · THE PROBLEM ============ -->\n  <section data-label=\"Evals lack a measurement culture\" data-screen-label=\"03\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">The gap<\u002Fdiv>\n      <div class=\"cols\" style=\"margin-top: calc(22px * var(--scale)); align-items:stretch;\">\n        <div class=\"stack\" style=\"justify-content:center; gap:calc(20px*var(--scale));\">\n          <h2 class=\"head anim d1\">LLM evals skip<br>this step<\u002Fh2>\n          <div class=\"body anim d2\" style=\"font-size: 40px\">Today, a model's score on a benchmark is usually reported as one number<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:calc(16px*var(--scale));\">\n            <li class=\"anim d3\" style=\"font-size: calc(28px * var(--scale))\">The few benchmarks that <em>do<\u002Fem> show error bars count only <b>which questions were sampled<\u002Fb>.<\u002Fli>\n            <li class=\"anim d4\" style=\"font-size: calc(28px * var(--scale))\">They ignore prompt wording, judge choice, temperature — and how those interact.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"anim d2\" id=\"prob-viz\" style=\"display:flex;align-items:stretch;\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim d5\" style=\"margin-top:calc(28px*var(--scale)); background: var(--accent-soft); border-radius: 16px; padding: calc(24px*var(--scale)) calc(30px*var(--scale)); font-size: 40px; color: var(--ink);\">These scores drive deployment, safety certification, and regulation,&nbsp;so the missing error bar has real-world consequences.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 4 · THE FRAMEWORK ============ -->\n  <section data-label=\"Total Eval Error\" data-screen-label=\"04\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">The framework being tested<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">Total Eval Error<\u002Fh2>\n      <div class=\"mono anim d1\" style=\"font-size:calc(24px*var(--scale)); color:var(--ink-3); margin-top:10px;\">Messing · arXiv:2604.11581<\u002Fdiv>\n      <div class=\"body anim d2\" style=\"margin-top: calc(20px*var(--scale)); max-width: 64ch; font-size: calc(28px * var(--scale))\">Borrows generalizability theory&nbsp;(a 50-year-old toolkit from psychology for separating signal from noise) and points it at LLM benchmarks.<\u002Fdiv>\n      <div class=\"cards anim d3\" style=\"grid-template-columns:1fr 1fr; margin-top: calc(36px*var(--scale));\">\n        <div class=\"card d3 anim\">\n          <div class=\"ct\" style=\"font-size: calc(28px * var(--scale))\"><span class=\"chip\">Tool 1<\u002Fspan>Variance decomposition<\u002Fdiv>\n          <div class=\"cb\" style=\"font-size: calc(28px * var(--scale))\">From a <b>small pilot run<\u002Fb>, split the total noise into named sources: questions, prompts, judges, temperature, and their interactions.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card d4 anim\">\n          <div class=\"ct\" style=\"font-size: calc(28px * var(--scale))\"><span class=\"chip\">Tool 2<\u002Fspan>The D-study<\u002Fdiv>\n          <div class=\"cb\" style=\"font-size: calc(28px * var(--scale))\">A “power calculator” for evals:&nbsp;predict the error bar for any future design, and put budget where it shrinks noise most.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"anim d5\" style=\"margin-top: calc(30px*var(--scale)); background: var(--accent-soft); border-radius: 16px; padding: calc(24px*var(--scale)) calc(30px*var(--scale)); font-size: 40px; color: var(--ink); max-width: 70ch\">Headline finding: naive error bars are too small, and smartly reallocating the same budget can cut the error in half.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 5 · PIPELINE DIAGRAM ============ -->\n  <section data-label=\"Where noise enters\" data-screen-label=\"05\">\n    <div class=\"pad\" style=\"padding-bottom:calc(44px * var(--scale));\">\n      <div class=\"eyebrow anim\">Anatomy of an eval score<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">Every stage adds noise &amp; offers a design choice<\u002Fh2>\n      <div class=\"anim d2\" id=\"pipe-viz\" style=\"flex:1; margin-top: calc(20px*var(--scale));\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 6 · DIVIDER: THE PROJECT ============ -->\n  <section data-label=\"My project\" class=\"divider\" data-screen-label=\"06\">\n    <div class=\"pad\" style=\"justify-content:center;\">\n      <div class=\"eyebrow anim\">My project<\u002Fdiv>\n      <h2 class=\"head anim d1\">Do the findings hold<br>off the beaten path?<\u002Fh2>\n      <div class=\"lead anim d2\" style=\"max-width: 46ch; font-size: 40px\">The paper proves its framework on English, frontier models.<br>I test two regimes the author flagged as untested.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 7 · OFF THE BEATEN PATH + 2x2 (merged) ============ -->\n  <section data-label=\"Off the beaten path\" data-screen-label=\"07\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">My project<\u002Fdiv>\n      <div class=\"cols top\" style=\"margin-top: calc(18px*var(--scale)); grid-template-columns: 1fr 1.08fr;\">\n        <div class=\"stack\" style=\"justify-content:center;\">\n          <h2 class=\"head anim d1\">Do the findings hold<br>off the beaten path?<\u002Fh2>\n          <div class=\"body anim d2\" style=\"font-size: calc(30px*var(--scale)); max-width:30ch\">The paper proves its framework on English, frontier models. I push it into the corners it flagged as untested: a 2×2 of model tier × language.<\u002Fdiv>\n          <ul class=\"clean anim d3\" style=\"margin-top: 6px; font-size: 6px\">\n            <li><b>Replicate<\u002Fb> the paper's English / frontier cell.<\u002Fli>\n            <li><b>Extend<\u002Fb> to non-frontier models.<\u002Fli>\n            <li><b>Extend<\u002Fb> to French (MMMLU-FR).<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"anim d2\" id=\"grid-viz\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 8 · DOES THE METHOD REPRODUCE? (credibility beat) ============ -->\n  <section data-label=\"Does the method reproduce?\" data-screen-label=\"08\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">Sanity check · does the method reproduce?<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">The story replicates, the exact numbers don't<\u002Fh2>\n      <div class=\"cols top anim d2\" style=\"margin-top: calc(34px*var(--scale)); align-items:stretch;\">\n        <div class=\"card\" style=\"border-color: color-mix(in srgb, #1b8a5a 32%, #fff); background: color-mix(in srgb,#1b8a5a 5%, #fff);\">\n          <div class=\"ct\" style=\"font-size: 40px\"><span style=\"color:#1b8a5a;\">✓<\u002Fspan> What worked<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:14px; margin-top:6px;\">\n            <li style=\"--b: #1b8a5a; font-size: 36px\">The full R pipeline ran cleanly on the bundled data.<\u002Fli>\n            <li style=\"--b: #1b8a5a; font-size: 36px\">The paper's <b>qualitative headlines reproduce<\u002Fb>:\n              <ul class=\"clean sub\" style=\"gap:8px; margin-top:10px;\">\n                <li style=\"--b: #1b8a5a; font-size: 32px\">Question difficulty dominates MMLU variance (<b>62%<\u002Fb>)<\u002Fli>\n                <li style=\"--b: #1b8a5a; font-size: 32px\">Naive CIs run too small (~20%, single-config comparison)<\u002Fli>\n              <\u002Ful>\n            <\u002Fli>\n            <li style=\"--b: #1b8a5a; font-size: 36px\">The D-study flags adding questions as the main lever (<b>−50%<\u002Fb> variance).<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-color: color-mix(in srgb, var(--accent) 38%, #fff); background: color-mix(in srgb, var(--accent) 6%, #fff);\">\n          <div class=\"ct\" style=\"font-size: 40px\"><span style=\"color:var(--accent);\">≠<\u002Fspan> What differed<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:14px; margin-top:6px;\">\n            <li style=\"--b: var(--accent); font-size: 36px\">We first measured a negative underestimate: the paper's central claim looked like it failed.<\u002Fli>\n            <li style=\"--b: var(--accent); font-size: 36px\">The author clarified:\n              <ul class=\"clean sub\" style=\"gap:8px; margin-top:10px;\">\n                <li style=\"--b: var(--accent); font-size: 32px\">the vignette's default compares against the full averaged design;<\u002Fli>\n                <li style=\"--b: var(--accent); font-size: 32px\">the paper's claim is the <b>single-config (V=1, M=1)<\u002Fb> comparison, which flips the sign positive.<\u002Fli>\n              <\u002Ful>\n            <\u002Fli>\n            <li style=\"--b: var(--accent); font-size: 36px\">Even corrected, our magnitude (<b>~20%<\u002Fb>) sits below the paper's <b>57%<\u002Fb>.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <style>\n      section[data-label=\"Does the method reproduce?\"] ul.clean li::before{ background: var(--b, var(--accent)); }\n    <\u002Fstyle>\n  <\u002Fsection>\n\n  <!-- ============ 9 · DATASET ============ -->\n  <section data-label=\"Dataset\" data-screen-label=\"09\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">The questions<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">One frozen set of questions, two languages<\u002Fh2>\n      <div class=\"anim d2\" id=\"data-viz\" style=\"margin-top: calc(36px*var(--scale)); flex:1;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10 · METHOD (merged data + config) ============ -->\n  <section data-label=\"Method\" data-screen-label=\"10\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">The eval setup<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">A fully crossed eval design<\u002Fh2>\n      <div class=\"anim d2\" id=\"method-viz\" style=\"margin-top: calc(30px*var(--scale)); flex:1;\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 10b · DIVIDER: FINDINGS ============ -->\n  <section data-label=\"Findings\" class=\"divider\" data-screen-label=\"10b\">\n    <div class=\"pad\" style=\"justify-content:center;\">\n      <div class=\"eyebrow anim\">What I found<\u002Fdiv>\n      <h2 class=\"head anim d1\">Findings &amp; Limitations<\u002Fh2>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 11 · FINDING 1 · VARIANCE DECOMPOSITION ============ -->\n  <section data-label=\"Finding 1 · Variance\" data-screen-label=\"11\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\"><span class=\"mono\">Finding 1<\u002Fspan> · Headline result<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">Where the noise comes from <em>flips<\u002Fem> with model tier<\u002Fh2>\n      <div class=\"anim d2\" id=\"var-viz\" style=\"margin-top: calc(8px*var(--scale)); flex:1;\"><\u002Fdiv>\n      <div style=\"display:flex; gap:calc(20px*var(--scale)); margin-top: calc(8px*var(--scale));\">\n        <div class=\"anim d3\" style=\"flex:1; background:var(--accent-soft); border-radius:14px; padding: calc(14px*var(--scale)) calc(22px*var(--scale)); font-size:calc(23px*var(--scale)); color:var(--ink); line-height:1.32;\">\n          <div style=\"margin-bottom: calc(7px*var(--scale)); font-size: 32px\"><b>Holds in French too.<\u002Fb> The tier effect dominates:<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:calc(5px*var(--scale));\">\n            <li><b>Frontier<\u002Fb> stays question-difficulty (67/61% EN/FR).<\u002Fli>\n            <li><b>Non-frontier<\u002Fb> stays model + run noise (≈60% in both).<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"anim d4\" style=\"flex: 1; background: var(--paper-2); border: 1px solid var(--line); border-radius: 14px; padding: calc(14px*var(--scale)) calc(22px*var(--scale)); font-size: 32px; color: var(--ink-2); line-height: 1.32\"><b style=\"color:var(--ink)\">Prompt wording barely matters.<\u002Fb><br>\nItem×prompt noise is &lt;1% in every cell.<br>\nA reassuring non-result on this judge-free task.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 12 · FINDING 2 · NAIVE CIs & THE INTERACTION ============ -->\n  <section data-label=\"Finding 2 · Interaction\" data-screen-label=\"12\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\"><span class=\"mono\">Finding 2<\u002Fspan> · The interaction<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">Naive error bars run too small<\u002Fh2>\n      <div class=\"stack\" style=\"margin-top: calc(26px*var(--scale)); gap:calc(28px*var(--scale));\">\n        <div class=\"cols top\" style=\"grid-template-columns: 1.02fr 1fr; align-items:start;\">\n          <div class=\"stack anim d2\" style=\"gap:calc(16px*var(--scale));\">\n            <div style=\"font-size: 36px; color: var(--ink-2); max-width: 40ch; text-wrap: pretty; line-height: 1.4\">For one model, one prompt (M=1, V=1), the exact thing a benchmark reports, we compare two error bars on the same score:<\u002Fdiv>\n            <ul class=\"clean\" style=\"gap:10px;\">\n              <li style=\"font-size: 36px; color: var(--ink-2)\"><span style=\"font-family:var(--mono); background:var(--paper-2); border:1px solid var(--line); border-radius:6px; padding:1px 8px; color:var(--ink);\">naive<\u002Fspan> treats the prompt as the only choice<\u002Fli>\n              <li style=\"font-size: 36px; color: var(--ink-2)\"><span style=\"font-family:var(--mono); background:var(--paper-2); border:1px solid var(--line); border-radius:6px; padding:1px 8px; color:var(--ink);\">honest<\u002Fspan> admits the prompt was one of many<\u002Fli>\n            <\u002Ful>\n            <div style=\"font-size: 36px; color: var(--ink-2); max-width: 40ch; text-wrap: pretty; line-height: 1.4\">The author prescribes this single-run comparison.<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"anim d2\" style=\"display:grid; grid-template-columns: 1.1fr 1fr 1fr; border:1px solid var(--line); border-radius:14px; overflow:hidden; font-family:var(--mono); align-self:center;\">\n            <div style=\"background:var(--paper-2); padding:16px 20px; font:600 24px var(--mono); color:var(--ink-3);\"><\u002Fdiv>\n            <div style=\"background:var(--paper-2); padding:16px 20px; font:600 26px var(--mono); color:var(--ink-2); text-align:center; border-left:1px solid var(--line);\">English<\u002Fdiv>\n            <div style=\"background:var(--paper-2); padding:16px 20px; font:600 26px var(--mono); color:var(--ink-2); text-align:center; border-left:1px solid var(--line);\">French<\u002Fdiv>\n\n            <div style=\"padding:20px; font:600 27px var(--mono); color:var(--chart-a); border-top:1px solid var(--line); display:flex; align-items:center;\">Frontier<\u002Fdiv>\n            <div style=\"padding:20px; font:600 38px var(--mono); color:var(--ink-2); text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line);\">≈0<\u002Fdiv>\n            <div style=\"padding:20px; font:600 38px var(--mono); color:var(--ink-2); text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line);\">≈0<\u002Fdiv>\n\n            <div style=\"padding:20px; font:600 27px var(--mono); color:var(--chart-b); border-top:1px solid var(--line); display:flex; align-items:center;\">Non-frontier<\u002Fdiv>\n            <div style=\"padding:20px; font:600 38px var(--mono); color:var(--ink); text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line);\">2%<\u002Fdiv>\n            <div style=\"padding:20px; font:700 42px var(--mono); color:#fff; text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line); background:var(--chart-b);\">14%<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"anim d3\" style=\"background: color-mix(in srgb, var(--chart-b) 7%, #fff); border:1px solid color-mix(in srgb, var(--chart-b) 30%, #fff); border-radius:16px; padding:calc(30px*var(--scale)) calc(40px*var(--scale)); display:flex; flex-direction:column; gap:calc(22px*var(--scale));\">\n          <div style=\"font: 600 calc(25px*var(--scale)) var(--mono); letter-spacing: .05em; text-transform: uppercase; color: var(--chart-b); font-size: 36px\">Honest caveat: suggestive, not settled<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:calc(18px*var(--scale));\">\n            <li style=\"--b: var(--chart-b); font-size: 36px; color: var(--ink-2); line-height: 1.5\">No error bars on these numbers.&nbsp;We can't rule out noise.<\u002Fli>\n            <li style=\"--b: var(--chart-b); font-size: 36px; color: var(--ink-2); line-height: 1.5\">The effect shows up only on this metric.&nbsp;The cleaner measure of prompt sensitivity shows nothing.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <style>\n      section[data-label=\"Finding 2 · Interaction\"] ul.clean li::before{ background: var(--b, var(--accent)); }\n    <\u002Fstyle>\n  <\u002Fsection>\n\n  <!-- ============ 13 · FINDING 3 · D-STUDY / BUDGET ============ -->\n  <section data-label=\"Finding 3 · D-study\" data-screen-label=\"13\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\"><span class=\"mono\">Finding 3<\u002Fspan> · The D-study<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">What actually cuts the error<\u002Fh2>\n      <div class=\"cards anim d2\" style=\"grid-template-columns:1fr 1fr; margin-top: calc(34px*var(--scale)); gap:calc(28px*var(--scale)); flex:1; align-content:start;\">\n        <div class=\"card\" style=\"border-top:4px solid var(--accent); justify-content:flex-start; gap:18px;\">\n          <div class=\"mono\" style=\"color:var(--accent); font-size:calc(23px*var(--scale)); letter-spacing:.06em; text-transform:uppercase;\">FOR THE MODELS WE RAN<\u002Fdiv>\n          <div class=\"ct\" style=\"font-size:calc(34px*var(--scale));\">Add questions<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:14px;\">\n            <li style=\"font-size:calc(27px*var(--scale));\">In every cell:\n              <ul class=\"clean\" style=\"gap:8px; margin-top:10px;\">\n                <li style=\"font-size:calc(25px*var(--scale));\">2× questions → ~29% smaller error bar<\u002Fli>\n                <li style=\"font-size:calc(25px*var(--scale));\">4× questions → ~50%<\u002Fli>\n              <\u002Ful>\n            <\u002Fli>\n            <li style=\"font-size:calc(27px*var(--scale));\">Prompts, reruns barely help → ≤2%<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-top:4px solid var(--chart-b); justify-content:flex-start; gap:18px;\">\n          <div class=\"mono\" style=\"color:var(--chart-b); font-size:calc(23px*var(--scale)); letter-spacing:.06em; text-transform:uppercase;\">For a claim about a tier<\u002Fdiv>\n          <div class=\"ct\" style=\"font-size:calc(34px*var(--scale));\">Add models<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:14px;\">\n            <li style=\"--b:var(--chart-b); font-size:calc(27px*var(--scale));\">With a couple of models per tier, the majority of tier-level uncertainty is “we only sampled a few models.”<\u002Fli>\n            <li style=\"--b:var(--chart-b); font-size:calc(27px*var(--scale));\">No amount of questions fixes that, the lever is more models<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <style>\n      section[data-label=\"Finding 3 · D-study\"] ul.clean li::before{ background: var(--b, var(--accent)); }\n    <\u002Fstyle>\n  <\u002Fsection>\n\n  <!-- ============ 14 · METHODOLOGICAL FINDING · PARSE FAILURES ============ -->\n  <section data-label=\"Methodological finding\" data-screen-label=\"14\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">Methodological finding · design sensitivity, surfaced<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">The paper's answer format breaks on modern models<\u002Fh2>\n      <div class=\"cols top\" style=\"margin-top: calc(26px*var(--scale)); grid-template-columns: 1fr 1.06fr; align-items:start;\">\n        <div class=\"stack anim d2\" style=\"gap:calc(18px*var(--scale));\">\n          <div class=\"mono\" style=\"color:var(--chart-b); font-size:calc(23px*var(--scale)); letter-spacing:.06em; text-transform:uppercase;\">The cause<\u002Fdiv>\n          <div class=\"body\" style=\"font-size: 36px; max-width: 32ch\">The protocol caps generation at\nmax_tokens = 16 (a bare-letter budget). Newer models reason out loud before answering&nbsp;and get cut off.<\u002Fdiv>\n          <div style=\"background:var(--paper-2); border:1px solid var(--line); border-radius:14px; padding:calc(20px*var(--scale)) calc(26px*var(--scale)); font-family:var(--mono); font-size:calc(25px*var(--scale)); color:var(--ink-2); line-height:1.55;\">\n            “To answer this, I first consider the key…” <span style=\"color:var(--chart-b);\">⟵ cut off, no letter answer to parse<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"stack anim d3\" style=\"gap:calc(18px*var(--scale));\">\n          <div class=\"mono\" style=\"color:var(--accent); font-size:calc(23px*var(--scale)); letter-spacing:.06em; text-transform:uppercase;\">The impact<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns: 1.5fr 1fr 1fr; border:1px solid var(--line); border-radius:14px; overflow:hidden;\">\n            <div style=\"background:var(--paper-2); padding:15px 22px; font:600 24px var(--mono); color:var(--ink-3);\">model<\u002Fdiv>\n            <div style=\"background:var(--paper-2); padding:15px 16px; font:600 24px var(--mono); color:var(--ink-3); text-align:center; border-left:1px solid var(--line);\">parse fail<\u002Fdiv>\n            <div style=\"background:var(--paper-2); padding:15px 16px; font:600 24px var(--mono); color:var(--ink-3); text-align:center; border-left:1px solid var(--line);\">tier<\u002Fdiv>\n\n            <div style=\"padding:18px 22px; font:500 27px var(--mono); color:var(--ink-2); border-top:1px solid var(--line); display:flex; align-items:center;\">deepseek-chat-v3.1<\u002Fdiv>\n            <div style=\"padding:18px 16px; font:600 30px var(--mono); color:var(--ink); text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line);\">24–37%<\u002Fdiv>\n            <div style=\"padding:18px 16px; font:500 24px var(--mono); color:var(--ink-3); text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line); line-height:1.25;\">frontier<br><span style=\"color:var(--chart-b);\">paper SUT!<\u002Fspan><\u002Fdiv>\n\n            <div style=\"padding:18px 22px; font:500 27px var(--mono); color:var(--ink-2); border-top:1px solid var(--line); display:flex; align-items:center;\">qwen3.5-flash<\u002Fdiv>\n            <div style=\"padding:18px 16px; font:600 30px var(--mono); color:var(--ink); text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line);\">15–19%<\u002Fdiv>\n            <div style=\"padding:18px 16px; font:500 24px var(--mono); color:var(--ink-3); text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line);\">non-frontier<\u002Fdiv>\n\n            <div style=\"padding:18px 22px; font:600 27px var(--mono); color:var(--ink); border-top:1px solid var(--line); display:flex; align-items:center; background:color-mix(in srgb, var(--chart-b) 8%, #fff);\">claude-sonnet-4.5<\u002Fdiv>\n            <div style=\"padding:18px 16px; font:700 34px var(--mono); color:#fff; text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line); background:var(--chart-b);\">39%<\u002Fdiv>\n            <div style=\"padding:18px 16px; font:600 24px var(--mono); color:var(--chart-b); text-align:center; border-top:1px solid var(--line); border-left:1px solid var(--line); background:color-mix(in srgb, var(--chart-b) 8%, #fff);\">frontier<\u002Fdiv>\n          <\u002Fdiv>\n          <ul class=\"clean\" style=\"gap: calc(12px*var(--scale)); margin-top: calc(2px*var(--scale)); font-size: 36px\">\n            <li style=\"--b:var(--chart-b); font-size:calc(25px*var(--scale)); color:var(--ink-2); line-height:1.4;\">Models from different tiers all fail alike<br>→ it tracks “thinks before answering,” not capability.<\u002Fli>\n            <li style=\"font-size:calc(25px*var(--scale)); color:var(--ink-2); line-height:1.4;\">The paper's 16-token regime does not survive the current model generation<br>→ We removed deepseek and qwen from the analysis, leaving only 2 valid models per tier<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <style>\n      section[data-label=\"Methodological finding\"] ul.clean li::before{ background: var(--b, var(--accent)); }\n    <\u002Fstyle>\n  <\u002Fsection>\n\n  <!-- ============ 15 · METHODOLOGICAL FINDING · NO CONFIDENCE INTERVALS ============ -->\n  <section data-label=\"Error bars limitation\" data-screen-label=\"15\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">A limitation · error bars<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">We couldn't put error bars on our own numbers — yet<\u002Fh2>\n      <div class=\"cols top\" style=\"margin-top: calc(30px*var(--scale)); grid-template-columns: 1fr 1.04fr; align-items:start;\">\n        <div class=\"stack anim d2\" style=\"gap:calc(22px*var(--scale));\">\n          <div class=\"body\" style=\"font-size:calc(28px*var(--scale)); max-width:36ch;\">This whole project argues that a benchmark score should be a <b>range, not a single number<\u002Fb>. So naturally, we wanted to report our own findings that way too.<\u002Fdiv>\n          <div style=\"font-size:calc(28px*var(--scale)); color:var(--ink-2); max-width:36ch;\">But the standard tool for it broke. We tried both of its built-in methods:<\u002Fdiv>\n          <ul class=\"clean\" style=\"display:flex; flex-direction:column; gap:calc(14px*var(--scale)); margin:0;\">\n            <li style=\"font-size: 36px; color: var(--ink-2); line-height: 1.4\">one runs but <b>never returns<\u002Fb> an answer.<\u002Fli>\n            <li style=\"font-size: 36px; color: var(--ink-2); line-height: 1.4\">the other <b>crashes<\u002Fb> on a software bug.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"anim d3\" style=\"background: color-mix(in srgb, var(--accent) 8%, #fff); border:1px solid color-mix(in srgb, var(--accent) 26%, #fff); border-radius:16px; padding:calc(30px*var(--scale)) calc(34px*var(--scale)); align-self:stretch; display:flex; flex-direction:column; gap:calc(16px*var(--scale));\">\n          <div class=\"mono\" style=\"color:var(--accent); font-size:calc(23px*var(--scale)); letter-spacing:.06em; text-transform:uppercase;\">What this means<\u002Fdiv>\n          <div style=\"font-size: 40px; color: var(--ink); letter-spacing: -.01em; line-height: 1.25\">Every number in this deck is a single point — <b>a dot, not a bar.<\u002Fb><\u002Fdiv>\n          <div style=\"font-size: 36px; color: var(--ink-2); line-height: 1.42; text-wrap: pretty\">An honest irony for a project about measurement noise.<\u002Fdiv>\n          <div style=\"font-size: 36px; color: var(--ink-2); line-height: 1.42; text-wrap: pretty\">Fixing this bug, so every finding gets its error bar, is the <b>#1 next step.<\u002Fb><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 16 · CONCLUSIONS · WHAT HOLDS, WHAT'S OPEN ============ -->\n  <section data-label=\"Conclusions\" data-screen-label=\"16\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">Conclusions<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">What holds, and what's still open<\u002Fh2>\n      <div class=\"cards anim d2\" style=\"grid-template-columns:1fr 1fr; margin-top: calc(34px*var(--scale)); gap:calc(28px*var(--scale)); flex:1; align-content:start;\">\n        <div class=\"card\" style=\"border-top:4px solid #1b8a5a; justify-content:flex-start; gap:18px;\">\n          <div class=\"mono\" style=\"color: #1b8a5a; font-size: 32px; letter-spacing: .06em; text-transform: uppercase\">What we can say<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:18px;\">\n            <li style=\"--b: #1b8a5a; font-size: 36px\">The variance decomposition flips with tier&nbsp;\nand is stable across language.<\u002Fli>\n            <li style=\"--b: #1b8a5a; font-size: 36px\">Naive CIs understate uncertainty, concentrated in non-frontier models,\nworst in French.<\u002Fli>\n            <li style=\"--b: #1b8a5a; font-size: 36px\">Cheapest fix differs: <b>more questions<\u002Fb> for these models, <b>more models<\u002Fb> to generalize a tier.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-top:4px solid var(--accent); justify-content:flex-start; gap:18px;\">\n          <div class=\"mono\" style=\"color: var(--accent); font-size: 32px; letter-spacing: .06em; text-transform: uppercase\">Limitations (honest)<\u002Fdiv>\n          <ul class=\"clean\" style=\"gap:18px;\">\n            <li style=\"--b: var(--accent); font-size: 36px\"><b>Point estimates only<\u002Fb><br>CI tooling is blocked, so the interaction is suggestive, not established.<\u002Fli>\n            <li style=\"--b: var(--accent); font-size: 36px\"><b>2 clean models per tier<\u002Fb><br>Parse failures shrank the pool; tier claims are SUT-sampling-limited.<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <style>\n      section[data-label=\"Conclusions\"] ul.clean li::before{ background: var(--b, var(--accent)); }\n    <\u002Fstyle>\n  <\u002Fsection>\n\n  <!-- ============ 17 · NEXT STEPS ============ -->\n  <section data-label=\"Next steps\" data-screen-label=\"17\">\n    <div class=\"pad\">\n      <div class=\"eyebrow anim\">Where this goes next<\u002Fdiv>\n      <h2 class=\"head anim d1\" style=\"margin-top:calc(14px*var(--scale))\">What's next<\u002Fh2>\n      <div class=\"cards anim d2\" style=\"grid-template-columns:1fr 1fr 1fr; margin-top: calc(34px*var(--scale)); gap:calc(24px*var(--scale)); flex:1; align-content:start;\">\n        <div class=\"card\" style=\"border-top:4px solid var(--accent); justify-content:flex-start; gap:18px;\">\n          <div class=\"mono\" style=\"color:var(--accent); font-size:calc(23px*var(--scale)); letter-spacing:.06em; text-transform:uppercase;\">#1 · Put error bars on every finding<\u002Fdiv>\n          <div style=\"font-size:calc(27px*var(--scale)); color:var(--ink-2); line-height:1.42; text-wrap:pretty;\">Unblock the CI tooling so every number becomes a range. The project is about error bars, it should report them.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-top:4px solid var(--chart-b); justify-content:flex-start; gap:18px;\">\n          <div class=\"mono\" style=\"color:var(--chart-b); font-size:calc(23px*var(--scale)); letter-spacing:.06em; text-transform:uppercase;\">#2 · Widen the model pool<\u002Fdiv>\n          <div style=\"font-size:calc(27px*var(--scale)); color:var(--ink-2); line-height:1.42; text-wrap:pretty;\">Use <b>format steering / a larger token budget<\u002Fb> to bring back parse-failing models, then add a third+ model per tier to generalize tier-level claims.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\" style=\"border-top:4px solid var(--chart-a); justify-content:flex-start; gap:18px;\">\n          <div class=\"mono\" style=\"color:var(--chart-a); font-size:calc(23px*var(--scale)); letter-spacing:.06em; text-transform:uppercase;\">#3 · Add the judge layer<\u002Fdiv>\n          <div style=\"font-size:calc(27px*var(--scale)); color:var(--ink-2); line-height:1.42; text-wrap:pretty;\">Rerun the tier × language design on <b>AILuminate<\u002Fb>, which uses an LLM judge.\nThat surfaces the one big noise source this project couldn't measure, and it's where the paper found its largest naive-CI underestimates.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 18 · THANKS ============ -->\n  <section data-label=\"Thanks\" class=\"divider\" data-screen-label=\"18\">\n    <div class=\"pad\" style=\"justify-content:center;\">\n      <div class=\"eyebrow anim\">Thank you<\u002Fdiv>\n      <h2 class=\"head anim d1\">Measurement error in&nbsp;LLM evals<\u002Fh2>\n      <div class=\"title-meta anim d2\" style=\"color:#9aa3b4;\">\n        <div>Replication &amp; extension of <span style=\"color:#fff;\">Total Eval Error<\u002Fspan> — Messing, 2026<\u002Fdiv>\n        <div style=\"color:#fff; margin-top:18px;\">Isabelle Phan<\u002Fdiv>\n        <div>BlueDot Technical AI Safety Sprint · 2026<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdeck-stage>\n\n<!-- Tweaks panel removed in export build -->\n\n<script src=\"8bbf54ef-a88f-408b-8207-6cf77ff591eb\"><\u002Fscript>\n<script src=\"3005b1ea-c48c-416a-96bc-250db18beb1b\"><\u002Fscript>\n<script src=\"8a93a12c-7f2e-484d-92d0-b0b64c5daa0c\"><\u002Fscript>\n\n<!-- Export build: keyboard focus on load + scroll-wheel navigation -->\n<script>\n(function () {\n  function deck() { return document.querySelector('deck-stage'); }\n\n  // Keyboard nav (deck listens on window keydown) needs the document focused.\n  // A directly-opened file doesn't always start focused — grab it explicitly.\n  function grab() { try { window.focus(); } catch (e) {} }\n  window.addEventListener('load', grab);\n  grab();\n  setTimeout(grab, 200);\n  window.addEventListener('pointerdown', grab, { passive: true });\n\n  // Scroll wheel / trackpad → step slides. Cooldown so one gesture = one slide.\n  var cooling = false;\n  window.addEventListener('wheel', function (e) {\n    var d = deck();\n    if (!d) return;\n    var delta = Math.abs(e.deltaY) >= Math.abs(e.deltaX) ? e.deltaY : e.deltaX;\n    if (Math.abs(delta) < 6) return;\n    e.preventDefault();\n    if (cooling) return;\n    cooling = true;\n    setTimeout(function () { cooling = false; }, 450);\n    if (delta > 0) d.next(); else d.prev();\n  }, { passive: false });\n})();\n<\u002Fscript>\n\n\n\n<style id=\"__om-edit-overrides\">\n#hook-viz >svg { height: 500px !important }\n#hook-viz >svg { stroke-width: 2px !important }\n#hook-viz >svg { stroke-width: 20px !important }\n#hook-viz >svg { stroke-width: 2px !important }\n#hook-viz >svg { height: 5000px !important }\n#hook-viz >svg { height: 800px !important }\n#prob-viz > div:nth-child(1) > div:nth-child(1) > div:nth-child(1) { font-size: 32px !important }\n#prob-viz > div:nth-child(1) > div:nth-child(1) > div:nth-child(1) { font-size: 28px !important }\n#prob-viz div:nth-child(2) >div { font-size: 28px !important }\n#hook-viz >svg { height: 900px !important }\n#hook-viz >svg { height: 1000px !important }\n#hook-viz >svg { height: 2000px !important }\n#pipe-viz > div:nth-child(2) > div:nth-child(1) > div:nth-child(1) > div:nth-child(1) { font-size: 32px !important }\n#pipe-viz > div:nth-child(2) > div:nth-child(3) > div:nth-child(1) > div:nth-child(1) { font-size: 32px !important }\n#pipe-viz div:nth-child(5) >div:nth-child(1) >div { font-size: 32px !important }\n#pipe-viz div:nth-child(7) >div:nth-child(1) >div { font-size: 32px !important }\n#pipe-viz div:nth-child(7) >div:nth-child(3) >div { font-size: 200px !important }\n#pipe-viz div:nth-child(7) >div:nth-child(3) >div { font-size: 32px !important }\n#data-viz > div:nth-child(1) > div:nth-child(1) > div:nth-child(1) > div:nth-child(2) { font-size: 36px !important }\n#data-viz div:nth-child(2) >div:nth-child(1) >div:nth-child(2) { font-size: 36px !important }\n#data-viz >div:nth-child(1) >div:nth-child(2) >div:nth-child(2) { font-size: 32px !important }\n#data-viz div:nth-child(2) >div:nth-child(3) { font-size: 32px !important }\n#data-viz > div:nth-child(1) > div:nth-child(1) > div:nth-child(3) > div:nth-child(1) > div:nth-child(1) { font-size: 32px !important }\n#data-viz div:nth-child(3) >div:nth-child(2) >div:nth-child(1) { font-size: 32px !important }\n#data-viz div:nth-child(3) >div:nth-child(3) >div:nth-child(1) { font-size: 32px !important }\n#data-viz div >div:nth-child(4) >div:nth-child(1) { font-size: 32px !important }\n#method-viz div:nth-child(1) >div:nth-child(2) >div:nth-child(3) { color: rgba(60, 67, 80, 0.72) !important }\n#method-viz div:nth-child(1) >div:nth-child(2) >div:nth-child(3) { color: rgba(60, 67, 80, 0.737) !important }\n#method-viz div:nth-child(1) >div:nth-child(2) >div:nth-child(3) { color: rgba(60, 67, 80, 0.745) !important }\ndiv:nth-child(2) >div:nth-child(2) >div:nth-child(2) >div:nth-child(2) { color: rgba(60, 67, 80, 0.75) !important }\n<\u002Fstyle>\n<\u002Fbody><\u002Fhtml>"
